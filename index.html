<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Yay — Vinyl Records</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>
<body class="static-page">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen active">
  <h1>Theme Yay's Vinyls</h1>
  <p>Sign in to browse this week's vinyls.</p>
  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" name="username">
    <label for="password">Password</label>
    <input type="password" id="password" name="password">
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen" style="display:none;">
  <header>
    <h1>Theme Yay's Vinyls</h1>
    <nav>
      <div class="nav-links">
        <a href="index.html#home" class="home-nav-link active">Home</a>
        <a href="about.html">About Us</a>
        <a href="resources.html">Resources</a>
        <a href="contact.html">Contact Us</a>
      </div>
      <button type="button" id="cartNavBtn">Cart (<span id="cartCount">0</span>)</button>
      <button type="button" id="logoutBtn">Log out</button>
    </nav>
  </header>
  <main>
    <h2>This Week's Vinyls</h2>
    <div id="productGrid" class="product-grid">
      <!-- product cards will be rendered by JavaScript -->
    </div>
  </main>
</div>

<!-- CART SCREEN -->
<div id="cartScreen" class="screen" style="display:none;">
  <header>
    <h1>Your Cart</h1>
    <nav>
      <div class="nav-links">
        <a href="index.html#home" class="home-nav-link">Home</a>
        <a href="about.html">About Us</a>
        <a href="resources.html">Resources</a>
        <a href="contact.html">Contact Us</a>
      </div>
      <button type="button" id="backToHomeBtn">Back to shop</button>
    </nav>
  </header>
  <main>
    <div id="cartItems"></div>
    <p id="cartEmptyMsg">Your cart is empty. Go look for records.</p>
    <div id="cartTotal" class="cart-total" style="display:none;">
      <span>Total</span>
      <span id="cartTotalPrice">₱0</span>
    </div>
  </main>
</div>

<!-- ===== POP-UP CARD (MODAL) ===== -->
<div id="popupOverlay" class="popup-overlay" style="display:none;">
  <div class="popup-card">
    <button class="close-btn" id="closePopup">&times;</button>
    <img id="popupCover" src="" alt="Cover" />
    <h2 id="popupTitle"></h2>
    <p class="popup-artist" id="popupArtist"></p>
    <p class="popup-price" id="popupPrice"></p>
    <p class="popup-description" id="popupDescription"></p>
    <div class="popup-buttons">
      <button class="btn-add" id="popupAddBtn">Add to Cart</button>
      <button class="btn-buy" id="popupBuyBtn">Buy Now</button>
    </div>
  </div>
</div>

</body>
</html>
