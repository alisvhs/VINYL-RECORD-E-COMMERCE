<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — Theme Yay's Vinyls</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="static-page">
 
<header>
  <h1>Theme Yay's Vinyls</h1>
  <nav>
    <div class="nav-links">
        <a href="index.html#home">Home</a>
        <a href="about.html">About Us</a>
        <a href="resources.html">Resources</a>
        <a href="contact.html" class="active">Contact Us</a>
      </div>
      <a href="index.html#cart"><button type="button">Cart (<span id="cartCount">0</span>)</button></a>
      <a href="index.html"><button type="button">Log out</button></a>
  </nav>
</header>
 
<main>
  <h2>Contact Us</h2>
  <form class="contact-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name">
 
    <label for="email">Email</label>
    <input type="email" id="email" name="email">
 
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5"></textarea>
 
    <button type="submit">Send Message</button>
  </form>
</main>
 
</body>
<script>
  const savedCart = localStorage.getItem("theme_yay_cart");
  const cart = savedCart ? JSON.parse(savedCart) : [];
  const total = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById("cartCount").textContent = total;
</script>
</html>
